<html>
    <head>
        <title>Home</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
        <style>
            body {
                background-image: url('Coffee Shop.jpg');
                background-size: cover;
                background-position: center;
                font-family: 'Inter', sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
                color: #222;
                overflow: hidden;
            }
            .home-card {
                background: rgba(255,255,255,0.85);
                padding: 2.5rem 2.5rem 2rem 2.5rem;
                border-radius: 18px;
                box-shadow: 0 8px 32px rgba(0,0,0,0.18);
                width: 100%;
                max-width: 400px;
                text-align: center;
                backdrop-filter: blur(4px);
                border: 1.5px solid rgba(111,78,55,0.15);
                animation: fadeIn 1.2s cubic-bezier(.39,.575,.56,1) both;
            }
            @keyframes fadeIn {
                0% { opacity: 0; transform: translateY(40px) scale(0.98); }
                100% { opacity: 1; transform: translateY(0) scale(1); }
            }
            .logo {
                width: 70px;
                height: 70px;
                object-fit: contain;
                margin-bottom: 1.2rem;
                filter: drop-shadow(0 2px 8px rgba(111,78,55,0.12));
                animation: logoPop 1.2s cubic-bezier(.39,.575,.56,1) 0.2s both;
            }
            @keyframes logoPop {
                0% { opacity: 0; transform: scale(0.7) rotate(-10deg); }
                100% { opacity: 1; transform: scale(1) rotate(0); }
            }
            .home-card h2 {
                margin-bottom: 1.2rem;
                color: #6F4E37;
                font-size: 2.1rem;
                font-weight: 800;
                letter-spacing: 1px;
                text-shadow: 0 2px 8px rgba(111,78,55,0.08);
            }
            .home-card .btn {
                width: 100%;
                padding: 0.85rem;
                background: linear-gradient(90deg, #6F4E37 60%, #a9825a 100%);
                color: #fff;
                border: none;
                border-radius: 6px;
                font-weight: 700;
                cursor: pointer;
                transition: background 0.2s, transform 0.15s;
                margin-bottom: 18px;
                font-size: 1.15rem;
                letter-spacing: 0.5px;
                text-decoration: none;
                display: block;
                box-shadow: 0 2px 8px rgba(111,78,55,0.08);
            }
            .home-card .btn:last-child {
                margin-bottom: 0;
            }
            .home-card .btn:hover {
                background: linear-gradient(90deg, #3E2723 60%, #6F4E37 100%);
                transform: translateY(-2px) scale(1.03);
            }
            .home-card .divider {
                margin: 1.2rem 0 1.2rem 0;
                border: none;
                border-top: 1.5px solid #e0d6ce;
                width: 60%;
                margin-left: auto;
                margin-right: auto;
            }
        </style>
 
    </head>
    <body>
        <div class="home-card">
            <h2>Welcome to Bean Haven Café</h2>
            <a href="/Login" class="btn">Login</a>
            <a href="/Registration" class="btn">Register</a>
            <hr class="divider" />
            <div style="font-size:1.05rem;color:#6F4E37;opacity:0.85;">Enjoy the best brews and bites in town!</div>
        </div>
    </body>
</html>
